name: carbon_twin
description: "CarbonTwin AI - Carbon Emission Awareness Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Charts
  fl_chart: ^0.66.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Image
  image_picker: ^1.0.7

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
